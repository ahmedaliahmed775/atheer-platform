# إعدادات سويتش Atheer — يُرجى نسخ هذا الملف إلى config.yaml وتعديل القيم
# المتغيرات بين ${} تُستبدل من متغيرات البيئة

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

# نقطة وصول شبكة الاتصالات — المعاملات من هذه النقطة تُسجّل كمصدر "carrier"
# شركة الاتصالات لا تفرض رسوم بيانات على مستخدمي Atheer وتأخذ عمولة من المحافظ بدلاً من ذلك
carrier:
  enabled: true
  port: 8081
  commission_rate: 5  # نسبة العمولة بالألف (5 = 0.5%)

database:
  host: ${DB_HOST:-localhost}  # localhost للتطوير، postgres لـ Docker
  port: 5432
  name: atheer
  user: atheer
  password: ${DB_PASSWORD}
  ssl_mode: ${DB_SSL_MODE:-disable}  # disable للتطوير، require للإنتاج (DigitalOcean)
  max_conns: 20

# إعدادات CORS — النطاقات المسموحة للداشبورد
cors:
  allowed_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
    # أضف نطاق الإنتاج هنا، مثلاً:
    # - https://atheer.yourdomain.com
    # - http://YOUR_SERVER_IP

security:
  timestamp_tolerance: 60
  look_ahead_window: 10
  default_payer_limit: 5000
  daily_limit: 50000
  monthly_limit: 500000
  jwt_secret: ${JWT_SECRET}
  jwt_expiry: 8h

kms:
  provider: local
  master_key: ${KMS_MASTER_KEY}

notifications:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
