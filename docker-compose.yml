# ═══════════════════════════════════════════════
# Atheer Platform — Docker Compose
# Switch (Go) + Dashboard (Next.js) + PostgreSQL + Redis
# ═══════════════════════════════════════════════

services:
  # === Go Switch Server ===
  switch:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://atheer:atheer_secret@postgres:5432/atheer?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=atheer_redis
      - ATHEER_SERVER_PORT=8080
      - ATHEER_ENV=development
      - LOG_LEVEL=DEBUG
    restart: unless-stopped

  # === PostgreSQL 16 ===
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: atheer
      POSTGRES_USER: atheer
      POSTGRES_PASSWORD: atheer_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atheer"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Redis 7 ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass atheer_redis --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "atheer_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Redis Commander (Dev UI) ===
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:atheer_redis
    depends_on:
      - redis
    profiles:
      - dev

  # === pgAdmin (Dev UI) ===
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@atheer.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  pgdata:
  redisdata:
