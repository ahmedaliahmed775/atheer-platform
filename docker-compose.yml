# ════════════════════════════════════════════════════
# Atheer Platform — Docker Compose
# يُشغّل: PostgreSQL + Switch (Go) + Dashboard (Next.js)
# ════════════════════════════════════════════════════

version: "3.9"

services:
  # ── قاعدة البيانات ──
  postgres:
    image: postgres:16-alpine
    container_name: atheer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atheer}
      POSTGRES_USER: ${POSTGRES_USER:-atheer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atheer_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atheer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── سويتش Atheer (Go) ──
  atheer-switch:
    build:
      context: ./switch
      dockerfile: Dockerfile
    container_name: atheer-switch
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ATHEER_DB_HOST=postgres
      - ATHEER_DB_PORT=5432
      - ATHEER_DB_NAME=${POSTGRES_DB:-atheer}
      - ATHEER_DB_USER=${POSTGRES_USER:-atheer}
      - ATHEER_DB_PASSWORD=${POSTGRES_PASSWORD:-atheer_secret}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - KMS_MASTER_KEY=${KMS_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - ./switch/config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── داشبورد Atheer (Next.js) ──
  atheer-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: atheer-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      atheer-switch:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://atheer-switch:8080

volumes:
  pgdata:
    driver: local
