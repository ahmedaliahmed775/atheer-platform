# ════════════════════════════════════════════════════
# Atheer Platform — Docker Compose للإنتاج
# يُشغّل: Nginx + Switch (Go) + Dashboard (Next.js) + PostgreSQL
# ════════════════════════════════════════════════════

services:
  # ── قاعدة البيانات ──
  postgres:
    image: postgres:16-alpine
    container_name: atheer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atheer}
      POSTGRES_USER: ${POSTGRES_USER:-atheer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atheer_secret}
    ports:
      - "127.0.0.1:5432:5432" # محلي فقط — لا وصول خارجي
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atheer}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - atheer-net

  # ── سويتش Atheer (Go) ──
  atheer-switch:
    build:
      context: ./switch
      dockerfile: Dockerfile
    container_name: atheer-switch
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080" # عبر nginx فقط
      - "8081:8081" # نقطة وصول شبكة الاتصالات (carrier) — وصول مباشر
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_PASSWORD=${POSTGRES_PASSWORD:-atheer_secret}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - KMS_MASTER_KEY=${KMS_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./switch/config.yaml:/app/config.yaml:ro
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - atheer-net

  # ── داشبورد Atheer (Next.js) ──
  atheer-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # عنوان API الخلفي — يُمرَّر وقت البناء (NEXT_PUBLIC_* = build-time)
        NEXT_PUBLIC_API_URL: http://atheer-switch:8080
    container_name: atheer-dashboard
    restart: unless-stopped
    depends_on:
      atheer-switch:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://atheer-switch:8080
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - atheer-net

  # ── Nginx — وكيل عكسي مع TLS ──
  nginx:
    image: nginx:alpine
    container_name: atheer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # شهادات TLS
      - ./nginx/logs:/var/log/nginx # سجلات
    depends_on:
      atheer-dashboard:
        condition: service_healthy
      atheer-switch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - atheer-net

volumes:
  pgdata:
    driver: local

networks:
  atheer-net:
    driver: bridge
